<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People's Pharma - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Style/login.css">
</head>
<body>

<div class="container">

    <div class="left">
        <div class="logo">People's Pharma</div>
        <div class="subtitle">
            Pharmacy Management System for managing
            medicines, sales, purchases, inventory and reports.
        </div>

        <div class="features">
            <div>✓ Sales Tracking</div>
            <div>✓ Inventory Management</div>
            <div>✓ Purchase Records</div>
            <div>✓ Business Analytics</div>
        </div>
    </div>

    <div class="right">
        <div class="login-box">

            <h2>Welcome Back</h2>
            <p>Login to your account</p>

            <form>
                <div class="input-group">
                    <label>Username</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password">
                </div>

                <button type="submit" class="btn">
                    Login
                </button>

                <div class="footer">
                    Don't have an account?
                    <a href="#">Contact Admin</a>
                </div>
            </form>

        </div>
    </div>

</div>

</body>
</html>
