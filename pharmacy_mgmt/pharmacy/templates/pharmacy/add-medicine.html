<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Medicine · Peoples Pharma Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Style/add_medicine.css">
</head>
<body>

<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand__mark">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#14B8A6"><path d="M12 2v20M2 12h20"/></svg>
      </div>
      <div class="brand__text">
        <h1>Peoples Pharma</h1>
        <span>Admin</span>
      </div>
    </div>

    <ul class="nav">
      <li><a href="index.html" class="nav__link">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Dashboard
      </a></li>
      <li><a href="add-medicine.html" class="nav__link is-active">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M11 7v8M7 11h8"/></svg>
        Add Medicine
        <span class="nav__pulse"></span>
      </a></li>
      <li><a href="#" class="nav__link">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V10M10 19V4M16 19v-7M22 19H2"/></svg>
        Sales Report
      </a></li>
      <li><a href="#" class="nav__link">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h2l2.6 12.3a2 2 0 0 0 2 1.7h8.8a2 2 0 0 0 2-1.6L21 8H6"/></svg>
        Sale Medicines
      </a></li>
    </ul>

    <div class="sidebar__spacer"></div>

    <a href="{% url 'logout' %}" class="nav__logout">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      Logout
    </a>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">

    <div class="topbar">
      <div>
        <h2>Add Medicine</h2>
        <p>Register new stock and keep your inventory up to date</p>
      </div>
      <div class="company-select">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg>
        <select id="companyName">
          <option value="">Company name</option>
          <option>Square Pharmaceuticals</option>
          <option>Beximco Pharma</option>
          <option>Incepta Pharmaceuticals</option>
          <option>ACI Limited</option>
          <option>Renata Limited</option>
        </select>
      </div>
    </div>

    <!-- Entry form -->
    <section class="form-card">
      <div class="form-card__title">New stock entry</div>
      <form id="medicineForm">
        <div class="form-row">
          <div class="field">
            <label for="productName">Product name</label>
            <input type="text" id="productName" placeholder="e.g. Napa" required>
          </div>
          <div class="field">
            <label for="productType">Product type</label>
            <select id="productType" required>
              <option value="" disabled selected>Select type</option>
              <option>Tablet</option>
              <option>Capsule</option>
              <option>Syrup</option>
              <option>Injection</option>
              <option>Drop</option>
              <option>Ointment</option>
            </select>
          </div>
          <div class="field">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" placeholder="50" min="1" required>
          </div>
          <div class="field">
            <label for="price">Price / unit</label>
            <input type="number" id="price" placeholder="2.00" min="0" step="0.01" required>
          </div>
          <button type="submit" class="btn-add">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Add
          </button>
        </div>
      </form>
    </section>

    <!-- Inventory table -->
    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Product Type</th>
            <th class="num">Quantity</th>
            <th class="num">Price / Unit</th>
            <th class="num">Total Price</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="medicineTableBody">
          <tr>
            <td>Napa</td>
            <td><span class="pill">Tablet</span></td>
            <td class="num">50</td>
            <td class="num">৳2.00</td>
            <td class="num">৳100.00</td>
            <td>
              <button class="row-delete" aria-label="Remove row">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>

  </main>
</div>

<script src="add-medicine.js"></script>
</body>
</html>
